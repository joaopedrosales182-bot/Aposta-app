<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Controle de Apostas Pro</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg0:#0a1628;--bg1:#0d1f3c;--bg2:#102444;--acc:#7c83fd;--bdr:#1e3a5f;--txt:#cbd5e1;--txt2:#94a3b8;--grn:#34d399;--red:#f87171}
    body{font-family:system-ui,sans-serif;background:var(--bg0);color:var(--txt);padding:20px}
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
    .stat-card{background:var(--bg1);border:0.5px solid var(--bdr);border-radius:8px;padding:12px;cursor:pointer}
    .breakdown-panel{display:none;background:var(--bg1);border:0.5px solid var(--bdr);border-radius:8px;padding:16px;margin-bottom:20px}
    .breakdown-panel.open{display:block}
    .breakdown-item{background:var(--bg2);border:0.5px solid var(--bdr);padding:8px 12px;border-radius:6px;display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px}
</style>
</head>
<body>

<div id="app">
  <div class="summary-grid">
    <div class="stat-card" onclick="toggleBreakdown('depositos')">Saldo Total<div id="total-depositos">R$ 0,00</div></div>
    <div class="stat-card" onclick="toggleBreakdown('apostado')">Total Apostado<div id="total-apostado">R$ 0,00</div></div>
  </div>

  <div class="breakdown-panel" id="panel-depositos">
    <div id="list-depositos"></div>
  </div>
  <div class="breakdown-panel" id="panel-apostado">
    <div id="list-apostado"></div>
  </div>
</div>

<script>
// Mock de dados para exemplificar a estrutura que você usa
let appData = {
  bets: ["BetMGM", "Superbet", "Betano", "Esportes da Sorte", "Bet365", "Ginga Bet", "Pix bet"],
  deposits: {"BetMGM": 9, "Bet365": 7.5, "Ginga Bet": 9, "Pix bet": -10},
  tickets: {} 
};

let activePanel = null;

function fmt(n) { return 'R$ ' + n.toFixed(2).replace('.', ','); }

function toggleBreakdown(type) {
  document.getElementById('panel-'+type).classList.toggle('open');
  activePanel = activePanel === type ? null : type;
  updateGlobals();
}

function updateGlobals() {
  let lists = { depositos: '', apostado: '' };
  
  appData.bets.forEach(bet => {
    let valor = parseFloat(appData.deposits[bet] || 0);
    
    // --- ESTA É A MUDANÇA ---
    // Só mostra na lista se o valor for diferente de 0
    if (valor !== 0) {
      lists.depositos += `<div class="breakdown-item"><span>${bet}</span><span>${fmt(valor)}</span></div>`;
      lists.apostado += `<div class="breakdown-item"><span>${bet}</span><span>${fmt(valor)}</span></div>`;
    }
  });

  document.getElementById('list-depositos').innerHTML = lists.depositos || '<div class="breakdown-item">Nenhuma banca com saldo ativo.</div>';
  document.getElementById('list-apostado').innerHTML = lists.apostado || '<div class="breakdown-item">Nenhuma movimentação registrada.</div>';
}

// Inicializa
updateGlobals();
</script>
</body>
</html>
