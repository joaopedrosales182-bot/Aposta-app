<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Controle de Apostas Pro</title>
<link class="ui-theme" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg0:#0a1628;--bg1:#0d1f3c;--bg2:#102444;--bg3:#163050;--acc:#7c83fd;--bdr:#1e3a5f;--txt:#cbd5e1;--txt2:#94a3b8;--grn:#34d399;--grn-bg:#1b4332;--red:#f87171;--red-bg:#4c0519;--yel:#fcd34d;--yel-bg:#3d3000}
:root.light{--bg0:#f0f4ff;--bg1:#ffffff;--bg2:#e8eeff;--bg3:#d8e2ff;--acc:#5b63e8;--bdr:#c5ccf0;--txt:#1e2a4a;--txt2:#5a6a8a;--grn:#16a34a;--grn-bg:#dcfce7;--red:#dc2626;--red-bg:#fee2e2;--yel:#b45309;--yel-bg:#fef3c7}
.theme-btn, .order-toggle-btn{background:transparent;border:0.5px solid var(--bdr);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--txt2);cursor:pointer;display:flex;align-items:center;gap:5px}
.theme-btn:hover, .order-toggle-btn:hover{border-color:var(--acc);color:var(--acc)}
.order-toggle-btn.active{background:var(--acc);color:#fff;border-color:var(--acc)}
body{font-family:system-ui,sans-serif;background:var(--bg0);color:var(--txt);min-height:100vh}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;padding:2rem}
#login-screen h1{color:var(--acc);font-size:24px;font-weight:600;margin-bottom:4px}
#login-screen p{color:var(--txt2);font-size:14px;text-align:center;max-width:300px;line-height:1.6}
.login-input{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:8px;padding:12px 16px;color:var(--txt);font-size:15px;width:280px;outline:none}
.login-input:focus{border-color:var(--acc)}
.login-btn{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:15px;font-weight:600;cursor:pointer;width:280px}
.login-btn:hover{opacity:.9}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{color:var(--red);font-size:13px;text-align:center;min-height:18px}
#app{display:none;padding:1rem;max-width:900px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:8px;padding-top:.5rem}
.topbar h1{color:var(--acc);font-size:18px;font-weight:600}
.user-badge{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:20px;padding:4px 14px;font-size:13px;color:var(--txt2);display:flex;align-items:center;gap:6px}
.logout-btn{background:transparent;border:0.5px solid var(--bdr);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--txt2);cursor:pointer}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.2rem}
.stat-card{background:var(--bg1);border:0.5px solid var(--bdr);border-radius:8px;padding:12px 14px}
.stat-label{font-size:11px;color:var(--txt2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-size:19px;font-weight:600}
.stat-val.green{color:var(--grn)}.stat-val.red{color:var(--red)}.stat-val.yellow{color:var(--yel)}.stat-val.white{color:var(--txt)}
.saving-indicator{font-size:11px;color:var(--txt2);text-align:right;margin-bottom:6px;min-height:16px}
.saving-indicator.ok{color:var(--grn)}
.saving-indicator.err{color:var(--red)}
.bet-section{background:var(--bg1);border:0.5px solid var(--bdr);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:transform 0.2s, box-shadow 0.2s}
.bet-section.dragging{opacity:0.5;transform:scale(0.98);box-shadow:0 5px 15px rgba(0,0,0,0.3)}
.bet-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:var(--bg2);border-bottom:0.5px solid var(--bdr);user-select:none}
.bet-header:hover{background:var(--bg3)}
.bet-name{font-weight:600;font-size:14px;color:var(--txt);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.drag-handle{cursor:move;color:var(--txt2);padding:2px 4px;display:none;align-items:center;justify-content:center}
.drag-handle:hover{color:var(--acc)}
.bet-badge{font-size:11px;background:var(--bg3);border:0.5px solid var(--bdr);border-radius:12px;padding:2px 8px;color:var(--txt2);font-weight:400}
.bet-actions{display:flex;align-items:center;gap:8px}
.add-ticket-btn{background:var(--acc);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer}
.add-ticket-btn:hover{opacity:.85}
.del-bet-btn{background:transparent;border:0.5px solid var(--bdr);border-radius:6px;padding:5px 8px;font-size:12px;color:var(--txt2);cursor:pointer}
.del-bet-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.chevron{color:var(--txt2);font-size:14px;transition:transform .2s}
.chevron.open{transform:rotate(180deg)}

.tickets-table{width:100%;border-collapse:collapse;table-layout:fixed}
.tickets-table th{background:var(--bg0);color:var(--acc);font-size:10px;font-weight:600;padding:7px 8px;text-align:center;border-bottom:0.5px solid var(--bdr);letter-spacing:.4px;text-transform:uppercase}
.tickets-table th:first-child{text-align:left;width:38%}
.tickets-table th:last-child{width:36px}
.tickets-table td{padding:8px;border-bottom:0.5px solid var(--bdr);font-size:13px;text-align:center;vertical-align:middle}
.tickets-table td:first-child{text-align:left}
.tickets-table tr:hover td{background:rgba(124,131,253,.02)}

.cell-input{background:var(--bg3);border:0.5px solid var(--bdr);border-radius:5px;padding:6px 8px;color:var(--txt);font-size:13px;width:100%;text-align:center;outline:none;font-family:inherit}
.cell-input:focus{border-color:var(--acc)}
.cell-input.name-input{text-align:left;font-weight:600}
.result-select{border:0.5px solid var(--bdr);border-radius:5px;padding:5px 4px;font-size:12px;font-weight:600;width:100%;outline:none;cursor:pointer;font-family:inherit}
.result-select.ganhou{background:var(--grn-bg);color:var(--grn);border-color:#34d39955}
.result-select.perdeu{background:var(--red-bg);color:var(--red);border-color:#f8717155}
.result-select.pendente{background:var(--yel-bg);color:var(--yel);border-color:#fcd34d55}
.del-btn{background:transparent;border:none;color:#5a5a5a;cursor:pointer;font-size:16px;padding:4px 6px;border-radius:4px}
.del-btn:hover{color:var(--red);background:var(--red-bg)}
.computed{color:var(--grn);font-size:13px}
.computed.loss{color:var(--red)}
.computed.pending{color:var(--txt2)}
.no-tickets{padding:18px;text-align:center;color:var(--txt2);font-size:13px}
.bet-totals{background:var(--bg0);padding:8px 14px;display:flex;gap:20px;flex-wrap:wrap;border-top:0.5px solid var(--bdr)}
.bet-total-item{font-size:12px;color:var(--txt2)}
.bet-total-item span{font-weight:600;margin-left:4px}
.add-bet-section{background:var(--bg1);border:0.5px dashed var(--acc);border-radius:10px;margin-bottom:10px;overflow:hidden}
.add-bet-trigger{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;color:var(--acc);font-size:14px;font-weight:500}
.add-bet-trigger:hover{background:var(--bg2)}
.add-bet-form{padding:14px 16px;border-top:0.5px solid var(--bdr);display:none;gap:10px;align-items:center;flex-wrap:wrap}
.add-bet-form.open{display:flex}
.add-bet-input{background:var(--bg3);border:0.5px solid var(--bdr);border-radius:7px;padding:9px 12px;color:var(--txt);font-size:14px;flex:1;min-width:180px;outline:none;font-family:inherit}
.add-bet-input:focus{border-color:var(--acc)}
.confirm-add-btn{background:var(--acc);color:#fff;border:none;border-radius:7px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.cancel-add-btn{background:transparent;border:0.5px solid var(--bdr);border-radius:7px;padding:9px 14px;font-size:14px;color:var(--txt2);cursor:pointer}
.cancel-add-btn:hover{border-color:var(--red);color:var(--red)}
.loading-overlay{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--txt2);font-size:14px;gap:8px}

.ticket-main-wrapper {display:flex; flex-direction:column; gap:4px; width:100%}
.ticket-title-row {display:flex; align-items:center; gap:6px}
.more-details-btn {background:transparent; border:none; color:var(--acc); font-size:11px; cursor:pointer; padding:4px; border-radius:4px; display:inline-flex; align-items:center; gap:2px; white-space:nowrap}
.more-details-btn:hover {background:rgba(124,131,253,.15)}

.timeline-container {display:none; margin-top:8px; background:rgba(0,0,0,0.18); border:1px solid var(--bdr); border-radius:6px; padding:12px 14px;}
.timeline-container.open {display:block}

.timeline-view {position:relative; padding-left:22px; margin-bottom:6px; display:flex; flex-direction:column; gap:10px;}
.timeline-view::before {content:''; position:absolute; left:4px; top:8px; bottom:8px; width:2.5px; background:var(--bdr); display:block !important;}

.timeline-node {position:relative; font-size:12px; color:var(--txt); line-height:1.5; text-align:left; display:flex; align-items:flex-start; gap:8px; user-select:none;}
.timeline-node::before {content:''; position:absolute; left:-22px; top:5px; width:9px; height:9px; background:var(--acc); border-radius:50%; box-shadow:0 0 0 2.5px var(--bg1); display:block !important; transition: background 0.2s}

.timeline-node.sub-node {margin-left:16px; font-size:11.5px; color:var(--txt2);}
.timeline-node.sub-node::before {left:-20px; width:6px; height:6px; top:6px; background:var(--bdr)}

.timeline-node.checked-node {color:var(--txt2); text-decoration:line-through; opacity:0.75}
.timeline-node.checked-node::before {background:var(--grn) !important;}

.node-checkbox {appearance:none; -webkit-appearance:none; width:14px; height:14px; border:1px solid var(--bdr); border-radius:3px; background:var(--bg0); cursor:pointer; position:relative; margin-top:3px; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; transition:all 0.2s}
.node-checkbox:checked {background:var(--grn); border-color:var(--grn)}
.node-checkbox:checked::after {content:'✓'; color:#0a1628; font-size:10px; font-weight:900; position:absolute; top:-1px}
.node-checkbox:hover {border-color:var(--acc)}

.node-text-wrapper {word-break:break-word; cursor:pointer; flex:1; padding-top:1px;}

.toggle-editor-btn {background:transparent; border:0.5px solid var(--bdr); color:var(--txt2); font-size:11px; padding:4px 8px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; gap:4px; margin-top:6px;}
.toggle-editor-btn:hover {border-color:var(--acc); color:var(--acc)}

.timeline-editor {display:none; margin-top:10px; border-top:0.5px dashed var(--bdr); padding-top:10px;}
.timeline-editor.open {display:block}
.timeline-textarea {width:100%; min-height:85px; background:var(--bg0); border:0.5px solid var(--bdr); border-radius:5px; color:var(--txt); font-size:12px; padding:6px 8px; outline:none; resize:vertical; font-family:inherit; line-height:1.5}
.timeline-textarea:focus {border-color:var(--acc)}

@media (max-width: 768px) {
  .tickets-table thead {display:none}
  .tickets-table, .tickets-table tbody, .tickets-table tr, .tickets-table td {display:block; width:100%}
  .tickets-table tr {background:var(--bg2); border:0.5px solid var(--bdr); border-radius:8px; margin-bottom:12px; padding:10px; display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; position:relative;}
  .tickets-table td:first-child {grid-column:span 2; padding:0 0 4px 0; border-bottom:0.5px solid var(--bdr);}
  .tickets-table td:not(:first-child):not(:last-child) {display:flex; flex-direction:column; align-items:flex-start; text-align:left; padding:2px 4px; border:none; background:transparent !important;}
  .tickets-table td:nth-child(2)::before {content:"Odd"; font-size:10px; color:var(--txt2); text-transform:uppercase; margin-bottom:2px; font-weight:600}
  .tickets-table td:nth-child(3)::before {content:"Gasto"; font-size:10px; color:var(--txt2); text-transform:uppercase; margin-bottom:2px; font-weight:600}
  .tickets-table td:nth-child(4)::before {content:"Retorno"; font-size:10px; color:var(--txt2); text-transform:uppercase; margin-bottom:2px; font-weight:600}
  .tickets-table td:nth-child(5)::before {content:"Lucro/Prej."; font-size:10px; color:var(--txt2); text-transform:uppercase; margin-bottom:2px; font-weight:600}
  .tickets-table td:nth-child(6)::before {content:"Resultado"; font-size:10px; color:var(--txt2); text-transform:uppercase; margin-bottom:2px; font-weight:600}
  .tickets-table td:last-child {position:absolute; top:6px; right:6px; width:auto; padding:0; border:none;}
}
</style>
</head>
<body>

<div id="login-screen">
  <i class="ti ti-chart-bar" style="font-size:52px;color:var(--acc)"></i>
  <h1>Controle de Apostas</h1>
  <p>Digite seu nome para acessar suas apostas. Dados salvos na nuvem.</p>
  <input class="login-input" id="username-input" placeholder="Seu nome ou apelido" maxlength="30"/>
  <button class="login-btn" id="login-btn" onclick="entrar()">Entrar</button>
  <div class="login-error" id="login-error"></div>
</div>

<div id="app">
  <div class="topbar">
    <h1><i class="ti ti-chart-bar" style="margin-right:6px"></i>Controle de Apostas</h1>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div class="user-badge"><i class="ti ti-cloud" style="font-size:14px"></i><span id="username-display"></span></div>
      <button class="order-toggle-btn" id="order-toggle-btn" onclick="toggleOrderMode()"><i class="ti ti-arrows-sort"></i><span id="order-btn-label">Reordenar Casas</span></button>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()"><i class="ti ti-sun" id="theme-icon"></i><span id="theme-label">Claro</span></button>
      <button class="logout-btn" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="summary-grid">
    <div class="stat-card"><div class="stat-label">Total gasto</div><div class="stat-val white" id="total-gasto">R$ 0,00</div></div>
    <div class="stat-card"><div class="stat-label">Possível retorno</div><div class="stat-val green" id="total-retorno">R$ 0,00</div></div>
    <div class="stat-card"><div class="stat-label">Lucro / Prejuízo</div><div class="stat-val white" id="total-lucro">R$ 0,00</div></div>
    <div class="stat-card"><div class="stat-label">Bilhetes abertos</div><div class="stat-val yellow" id="total-pendentes">0</div></div>
  </div>

  <div class="saving-indicator" id="saving-indicator"></div>
  <div id="bets-container"><div class="loading-overlay"><i class="ti ti-loader-2"></i>&nbsp;Carregando...</div></div>

  <div class="add-bet-section">
    <div class="add-bet-trigger" onclick="toggleAddForm()">
      <i class="ti ti-plus" style="font-size:18px"></i> Adicionar casa de aposta
    </div>
    <div class="add-bet-form" id="add-bet-form">
      <input class="add-bet-input" id="new-bet-input" placeholder="Nome da casa (ex: Pixbet)" maxlength="40" onkeydown="if(event.key==='Enter')confirmarNovaAposta()"/>
      <button class="confirm-add-btn" onclick="confirmarNovaAposta()">Adicionar</button>
      <button class="cancel-add-btn" onclick="toggleAddForm()">Cancelar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeDME3AoZQ81HKwGzvhzFXPcfs5krr3vc",
  authDomain: "apostas-app-6b448.firebaseapp.com",
  projectId: "apostas-app-6b448",
  storageBucket: "apostas-app-6b448.firebasestorage.app",
  messagingSenderId: "615567160984",
  appId: "1:615567160984:web:a221aa5bcb06f05c0002ed"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

const DEFAULT_BETS=["Betano","BetMGM","Superbet","Esportes da Sorte","Betnacional","Bet365","KTO","Novibet","Sportingbet"];
let currentUser='';
let openSections={};
let expandedNotes={}; 
let openEditors={}; 
let saveTimer=null;
let addFormOpen=false;
let isOrderMode=false;
let appData={bets:[...DEFAULT_BETS],tickets:{}};

function userDocId(){return currentUser.toLowerCase().trim().replace(/\s+/g,'_')}

async function cloudSave(){
  try{
    await setDoc(doc(db,'usuarios',userDocId()),{data:JSON.stringify(appData),updatedAt:Date.now()});
    showSaving('✓ Sincronizado','ok');
  }catch(e){}
}

async function cloudLoad(){
  try{
    const snap=await getDoc(doc(db,'usuarios',userDocId()));
    if(snap.exists()){
      appData=JSON.parse(snap.data().data);
    }
  }catch(e){}
}

function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>cloudSave(),800);}
function showSaving(msg,cls){
  const el=document.getElementById('saving-indicator');
  if(!el) return; el.textContent=msg; el.className='saving-indicator '+cls;
  setTimeout(()=>{el.textContent='';},2000);
}

// Automação Background 100% invisível baseada no título da aposta
async function autoCheckLiveMatch(ticket, bet, idx, ticketUniqueId) {
  const query = (ticket.nome || '').trim();
  if(!query || query.length < 3 || ticket.resultado !== 'Pendente') return;

  try {
    const res = await fetch(`https://v3.football.api-sports.io/fixtures?search=${encodeURIComponent(query)}&live=all`, {
      method: "GET",
      headers: {
        "x-rapidapi-key": "713e2f49557b448a6bd079234b07fbdf",
        "x-rapidapi-host": "v3.football.api-sports.io"
      }
    });
    const data = await res.json();
    if(!data.response || data.response.length === 0) return;

    const match = data.response[0];
    const goalsHome = match.goals.home || 0;
    const goalsAway = match.goals.away || 0;
    const totalGoals = goalsHome + goalsAway;

    if(!ticket.checkedItems) ticket.checkedItems = {};
    if(!ticket.userInterventions) ticket.userInterventions = {};

    const lines = (ticket.notas || '').split('\n');
    let mudou = false;

    lines.forEach((line, lineId) => {
      // Se você mexeu manualmente nesse tópico, o robô ignora e respeita a sua escolha
      if(ticket.userInterventions[lineId]) return;

      const text = line.toLowerCase();
      if(!text.trim()) return;

      if(text.includes('mais de 1.5') || text.includes('+1.5') || text.includes('mais 1.5')){
        if(totalGoals > 1 && !ticket.checkedItems[lineId]) { ticket.checkedItems[lineId] = true; mudou = true; }
      }
      if(text.includes('mais de 2.5') || text.includes('+2.5') || text.includes('mais 2.5')){
        if(totalGoals > 2 && !ticket.checkedItems[lineId]) { ticket.checkedItems[lineId] = true; mudou = true; }
      }
      if(text.includes('ambos marcam') || text.includes('ambas marcam')){
        if(goalsHome > 0 && goalsAway > 0 && !ticket.checkedItems[lineId]) { ticket.checkedItems[lineId] = true; mudou = true; }
      }
    });

    if(mudou) {
      window.buildTimelineDOM(ticketUniqueId, ticket.notas || '', ticket.checkedItems, bet, idx);
      scheduleSave();
    }
  } catch(e){}
}

window.entrar=async function(){
  const v=document.getElementById('username-input').value.trim();
  if(!v)return; currentUser=v;
  await cloudLoad();
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('username-display').textContent=v;
  renderAll();
};

window.sair=function(){
  currentUser=''; document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
};

window.toggleTheme=function(){
  const isLight=document.documentElement.classList.toggle("light");
  document.getElementById("theme-icon").className=isLight?"ti ti-moon":"ti ti-sun";
  document.getElementById("theme-label").textContent=isLight?"Escuro":"Claro";
};

function fmt(n){return'R$ '+n.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');}

function calcTicket(t){
  const odd=parseFloat(String(t.odd||'').replace(',','.'));
  const gasto=parseFloat(String(t.gasto||'').replace(',','.'));
  const retorno=odd>0&&gasto>0?odd*gasto:0;
  let lucro=0,lucroClass='pending',lucroTxt='Aguardando';
  if(t.resultado==='Ganhou'){lucro=retorno-gasto;lucroClass=lucro>=0?'':'loss';lucroTxt=fmt(lucro);}
  else if(t.resultado==='Perdeu'){lucro=-gasto;lucroClass='loss';lucroTxt=fmt(lucro);}
  return{retorno,lucro,lucroClass,lucroTxt,retornoTxt:retorno>0?fmt(retorno):'—',gastoVal:gasto>0?gasto:0};
}

function updateGlobals(){
  let tG=0,tR=0,tL=0,tP=0;
  appData.bets.forEach(bet=>{
    (appData.tickets[bet]||[]).forEach(t=>{
      const c=calcTicket(t); tG+=c.gastoVal;
      if(t.resultado==='Pendente'){tR+=c.retorno;tP++;}
      else tL+=c.lucro;
    });
  });
  document.getElementById('total-gasto').textContent=fmt(tG);
  document.getElementById('total-retorno').textContent=fmt(tR);
  document.getElementById('total-lucro').textContent=fmt(tL);
  document.getElementById('total-pendentes').textContent=tP;
}

function safeId(bet){return'b_'+bet.replace(/[^a-zA-Z0-9]/g,'_');}

window.toggleNote=function(ticketUniqueId){
  expandedNotes[ticketUniqueId] = !expandedNotes[ticketUniqueId];
  const container = document.getElementById('note-container-'+ticketUniqueId);
  if(container) container.classList.toggle('open', expandedNotes[ticketUniqueId]);
};

window.toggleEditorBox=function(ticketUniqueId){
  openEditors[ticketUniqueId] = !openEditors[ticketUniqueId];
  const editBox = document.getElementById('edit-box-'+ticketUniqueId);
  if(editBox) editBox.classList.toggle('open', openEditors[ticketUniqueId]);
};

window.buildTimelineDOM=function(ticketUniqueId, textValue, checkedMap, bet, idx) {
  const view = document.getElementById('timeline-view-'+ticketUniqueId);
  if(!view) return;
  const lines = textValue.split('\n');
  let html = '';
  lines.forEach((line, lineId) => {
    const trimmed = line.trim();
    if(!trimmed) return;
    const isSub = line.startsWith(' ') || line.startsWith('\t') || line.startsWith('-') || line.startsWith('*');
    let cleanText = trimmed.replace(/^[-*]\s*/, '');
    const isChecked = !!checkedMap[lineId];
    html += `
      <div class="timeline-node ${isSub ? 'sub-node' : ''} ${isChecked ? 'checked-node' : ''}">
        <input type="checkbox" class="node-checkbox" ${isChecked ? 'checked' : ''} onclick="window.toggleNodeCheck('${ticketUniqueId}', ${lineId}, '${bet}', ${idx})"/>
        <div class="node-text-wrapper" onclick="window.toggleNodeCheck('${ticketUniqueId}', ${lineId}, '${bet}', ${idx})">${cleanText}</div>
      </div>`;
  });
  view.innerHTML = html || `<div style="color:var(--txt2); font-style:italic; font-size:12px;">Nenhum palpite em tópicos.</div>`;
};

window.toggleNodeCheck=function(ticketUniqueId, lineId, bet, idx) {
  const ticket = appData.tickets[bet][idx];
  if(!ticket.checkedItems) ticket.checkedItems = {};
  if(!ticket.userInterventions) ticket.userInterventions = {};
  
  // Inverte o estado atual
  ticket.checkedItems[lineId] = !ticket.checkedItems[lineId];
  // Bloqueia a automação de mexer aqui no futuro
  ticket.userInterventions[lineId] = true; 
  
  window.buildTimelineDOM(ticketUniqueId, ticket.notas || '', ticket.checkedItems, bet, idx);
  scheduleSave();
};

window.updateTimelinePreview=function(ticketUniqueId, textValue, bet, idx) {
  const ticket = appData.tickets[bet][idx];
  ticket.notas = textValue;
  if(!ticket.checkedItems) ticket.checkedItems = {};
  window.buildTimelineDOM(ticketUniqueId, textValue, ticket.checkedItems, bet, idx);
  scheduleSave();
};

function renderBet(bet){
  const tickets=appData.tickets[bet]||[];
  const isOpen=openSections[bet]!==false;
  const sid=safeId(bet);
  const section=document.createElement('div');
  section.className='bet-section'; section.id='section-'+sid;
  const be=bet.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  
  section.innerHTML=`
    <div class="bet-header" onclick="toggleSection('${be}')">
      <div class="bet-name">
        <span class="drag-handle" style="display:${isOrderMode?'inline-flex':'none'}"><i class="ti ti-selector"></i></span>
        <i class="ti ti-device-gamepad-2" style="color:var(--acc);font-size:15px"></i>
        <span>${bet}</span>
        <span class="bet-badge">${tickets.length} bilhete${tickets.length!==1?'s':''}</span>
      </div>
      <div class="bet-actions" onclick="event.stopPropagation()">
        <button class="add-ticket-btn" onclick="addTicket('${be}')"><i class="ti ti-plus"></i> Bilhete</button>
        <i class="ti ti-chevron-down chevron ${isOpen?'open':''}" id="chev-${sid}"></i>
      </div>
    </div>
    <div id="body-${sid}" style="display:${isOpen?'block':'none'}">
      ${tickets.length===0
        ?`<div class="no-tickets">Nenhum bilhete cadastrado.</div>`
        :`<table class="tickets-table">
          <thead><tr><th>Título da Aposta / Tópicos</th><th>Odd</th><th>Gasto</th><th>Retorno</th><th>Lucro</th><th>Resultado</th><th></th></tr></thead>
          <tbody>${tickets.map((t,i)=>{
            const c=calcTicket(t);
            const tUniqueId = sid + '_' + (t.id || i);
            const isNxtOpen = !!expandedNotes[tUniqueId];
            const isEdOpen = !!openEditors[tUniqueId];
            
            // Dispara análise silenciosa em background
            autoCheckLiveMatch(t, bet, i, tUniqueId);

            return`<tr>
              <td>
                <div class="ticket-main-wrapper">
                  <div class="ticket-title-row">
                    <input class="cell-input name-input" value="${(t.nome||'').replace(/"/g,'&quot;')}" placeholder="Time Mandante ou Visitante (Ex: Real Madrid)" onchange="updateField('${be}',${i},'nome',this.value)"/>
                    <button class="more-details-btn" onclick="event.stopPropagation(); toggleNote('${tUniqueId}')"><i class="ti ti-chevron-down"></i> Tópicos</button>
                  </div>
                  <div class="timeline-container ${isNxtOpen?'open':''}" id="note-container-${tUniqueId}" onclick="event.stopPropagation()">
                    <div class="timeline-view" id="timeline-view-${tUniqueId}"></div>
                    <button class="toggle-editor-btn" onclick="toggleEditorBox('${tUniqueId}')">✍️ Configurar Tópicos</button>
                    <div class="timeline-editor ${isEdOpen?'open':''}" id="edit-box-${tUniqueId}">
                      <textarea class="timeline-textarea" placeholder="Mais de 1.5 Gols&#10;Ambos Marcam" oninput="window.updateTimelinePreview('${tUniqueId}', this.value, '${be}', ${i})">${t.notas||''}</textarea>
                    </div>
                  </div>
                </div>
              </td>
              <td><input class="cell-input" type="number" step="0.01" value="${t.odd||''}" placeholder="2.00" onchange="updateField('${be}',${i},'odd',this.value)"/></td>
              <td><input class="cell-input" type="number" step="0.01" value="${t.gasto||''}" placeholder="10" onchange="updateField('${be}',${i},'gasto',this.value)"/></td>
              <td class="computed">${c.retornoTxt}</td>
              <td class="computed ${c.lucroClass}">${c.lucroTxt}</td>
              <td><select class="result-select ${t.resultado.toLowerCase()}" onchange="updateField('${be}',${i},'resultado',this.value)">
                <option ${t.resultado==='Pendente'?'selected':''}>Pendente</option>
                <option ${t.resultado==='Ganhou'?'selected':''}>Ganhou</option>
                <option ${t.resultado==='Perdeu'?'selected':''}>Perdeu</option>
              </select></td>
              <td><button class="del-btn" onclick="deleteTicket('${be}',${i})"><i class="ti ti-trash"></i></button></td>
            </tr>`;}).join('')}</tbody>
        </table>`}
    </div>`;
  
  // Renderiza conteúdo interno da timeline após injetar HTML estrutural
  setTimeout(()=>{
    tickets.forEach((t, i) => {
      const tUniqueId = sid + '_' + (t.id || i);
      window.buildTimelineDOM(tUniqueId, t.notas || '', t.checkedItems || {}, bet, i);
    });
  }, 10);

  return section;
}

function renderAll(){
  const container=document.getElementById('bets-container');
  if(!container) return; container.innerHTML='';
  appData.bets.forEach(bet=>container.appendChild(renderBet(bet)));
  updateGlobals();
}

window.toggleSection=function(bet){
  openSections[bet]=openSections[bet]===false;
  refreshBet(bet);
};

window.addTicket=function(bet){
  openSections[bet]=true;
  if(!appData.tickets[bet])appData.tickets[bet]=[];
  appData.tickets[bet].push({id:Date.now(),nome:'',odd:'',gasto:'',resultado:'Pendente',notas:'',checkedItems:{},userInterventions:{}});
  renderAll(); scheduleSave();
};

window.updateField=function(bet,idx,field,value){
  appData.tickets[bet][idx][field]=value;
  updateGlobals(); scheduleSave();
};

window.deleteTicket=function(bet,idx){
  appData.tickets[bet].splice(idx,1);
  renderAll(); scheduleSave();
};

function refreshBet(bet){
  const section=document.getElementById('section-'+safeId(bet));
  if(section) section.replaceWith(renderBet(bet));
}

window.toggleAddForm=function(){
  addFormOpen=!addFormOpen;
  document.getElementById('add-bet-form').classList.toggle('open', addFormOpen);
};

window.confirmarNovaAposta=function(){
  const input=document.getElementById('new-bet-input');
  const nome=input.value.trim();
  if(!nome)return; appData.bets.push(nome);
  input.value=''; addFormOpen=false;
  renderAll(); scheduleSave();
};
</script>
</body>
</html>
